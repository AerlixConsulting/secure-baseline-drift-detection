name: CI

on:
  push:
    branches: ["main", "copilot/**", "feature/**", "fix/**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov ruff

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          pip install pyyaml
          pip install setuptools wheel
          pip install -e .

      - name: Capture example baseline
        run: |
          drift-detect baseline capture \
            --input examples/current_state.yaml \
            --system-id smoke-test-01 \
            --profile cis-level2 \
            --output /tmp/test-baseline.json

      - name: Run drift detection
        run: |
          drift-detect drift compare \
            --baseline examples/baselines/bl-20240301-webserver-prod-01.json \
            --current examples/current_state.yaml \
            --rules examples/compliance_profile.yaml \
            --output /tmp/test-drift-report.json || true

      - name: Validate drift report output
        run: |
          python -c "
          import json, sys
          data = json.load(open('/tmp/test-drift-report.json'))
          assert 'findings' in data, 'Missing findings key'
          assert 'summary' in data, 'Missing summary key'
          print(f'Drift report valid: {data[\"summary\"][\"drifted\"]} findings')
          "

      - name: Run compliance evaluation
        run: |
          drift-detect compliance evaluate \
            --drift-report /tmp/test-drift-report.json \
            --rules examples/compliance_profile.yaml || true
